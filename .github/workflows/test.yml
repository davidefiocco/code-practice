name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ github.token }}
          version: latest
          args: --check lua/ plugin/

      - uses: YoloWingPixie/selene-lua-linter-action@v1
        with:
          config-path: selene.toml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t code-practice-test .

      - name: Run headless tests
        run: docker run --rm code-practice-test
